name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (zero warnings) + Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (treat warnings as errors)
        env:
          # Mirror the project's hard rule: warnings are errors.
          OTHER_SWIFT_FLAGS: "-warnings-as-errors"
        run: |
          set -o pipefail
          xcodebuild \
            -project MemoryAisle2/MemoryAisle2.xcodeproj \
            -scheme MemoryAisle2 \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -configuration Debug \
            clean build \
            | xcbeautify --renderer github-actions || (cat -; exit 1)

      - name: Test
        run: |
          set -o pipefail
          xcodebuild \
            -project MemoryAisle2/MemoryAisle2.xcodeproj \
            -scheme MemoryAisle2 \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -configuration Debug \
            test \
            | xcbeautify --renderer github-actions || (cat -; exit 1)

      - name: Em-dash audit (UI strings only)
        # Hard rule from CLAUDE.md: no em dashes in user-visible strings.
        # Comments and docs are exempt; this checks Text("..."), Mira prompts,
        # and any string literal under Features/, DesignSystem/Editorial/.
        run: |
          set -e
          if grep -rn '"[^"]*—[^"]*"' \
              MemoryAisle2/MemoryAisle2/Features \
              MemoryAisle2/MemoryAisle2/DesignSystem/Editorial; then
            echo "::error::Em-dash found in user-visible string. Use middle-dot · or rephrase."
            exit 1
          fi

      - name: Print rule (no print(...) in source)
        # Hard rule from CLAUDE.md: use os.Logger, not print.
        run: |
          set -e
          if grep -rn 'print(' \
              MemoryAisle2/MemoryAisle2 \
              --include='*.swift' \
              | grep -v '^[^:]*:[^:]*://' \
              | grep -v '/\*'; then
            echo "::error::Stray print(...) call found. Use os.Logger."
            exit 1
          fi
