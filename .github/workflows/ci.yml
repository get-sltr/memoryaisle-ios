name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (zero warnings) + Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use the newest Xcode available on the runner. The project's
      # IPHONEOS_DEPLOYMENT_TARGET (18.6) requires a recent SDK; pinning
      # to a specific Xcode version drifts as deployment target moves.
      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No Xcode_*.app found; using default"
          else
            echo "Selecting $LATEST"
            sudo xcode-select -s "$LATEST/Contents/Developer"
          fi

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (treat warnings as errors)
        env:
          # Mirror the project's hard rule: warnings are errors.
          OTHER_SWIFT_FLAGS: "-warnings-as-errors"
        run: |
          set -o pipefail
          xcodebuild \
            -project MemoryAisle2/MemoryAisle2.xcodeproj \
            -scheme MemoryAisle2 \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            clean build \
            | xcbeautify --renderer github-actions || (cat -; exit 1)

      # Tests are skipped on CI for now: the macos-15 runner ships
      # without an iOS simulator runtime installed by default, and
      # provisioning one in the workflow is slow and brittle. The build
      # step above proves the code compiles; tests run locally via
      # `xcodebuild test` against a real simulator.
      # - name: Test
      #   ...

      - name: Em-dash audit (UI strings only)
        # Hard rule from CLAUDE.md: no em dashes in user-visible strings.
        # Comments and docs are exempt; this checks Text("..."), Mira prompts,
        # and any string literal under Features/, DesignSystem/Editorial/.
        run: |
          set -e
          if grep -rn '"[^"]*—[^"]*"' \
              MemoryAisle2/MemoryAisle2/Features \
              MemoryAisle2/MemoryAisle2/DesignSystem/Editorial; then
            echo "::error::Em-dash found in user-visible string. Use middle-dot · or rephrase."
            exit 1
          fi

      - name: Print rule (no print(...) in source)
        # Hard rule from CLAUDE.md: use os.Logger, not print.
        run: |
          set -e
          if grep -rn 'print(' \
              MemoryAisle2/MemoryAisle2 \
              --include='*.swift' \
              | grep -v '^[^:]*:[^:]*://' \
              | grep -v '/\*'; then
            echo "::error::Stray print(...) call found. Use os.Logger."
            exit 1
          fi
